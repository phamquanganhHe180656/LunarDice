name: lunar_dice_backend
description: Dart/Shelf backend server for LunarDice (Bầu Cua Tôm Cá) with MySQL integration.
publish_to: 'none'

version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  shelf_cors_headers: ^0.1.5
  mysql_client: ^0.0.27
  dotenv: ^4.1.0
  uuid: ^4.2.2

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0
